<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<nav>
  <div class="logo">Nexa<span>Studio</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <a href="login.html" class="nav-cta">Sign In</a>
</nav>

<div class="auth-container">

  <!-- LEFT SIDE -->
  <div class="auth-left">
    <h1>Join NexaStudio 🚀</h1>
    <p>Create your account and start building amazing digital products today.</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="auth-card">

    <h2>Create Account</h2>
    <p class="sub">Fill in your details</p>

    <form>

      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="text" placeholder="Username" required>
      <input type="password" placeholder="Password" required>

      <div class="auth-options">
        <label><input type="checkbox"> I agree to Terms</label>
      </div>

      <button type="submit">Create Account →</button>

    </form>

    <p class="switch">
      Already have an account?
      <a href="login.html">Login</a>
    </p>

  </div>

</div>

</body>
</html>
