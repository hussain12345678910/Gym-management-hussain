<body>

<nav>
  <div class="logo">Nexa<span>Studio</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
  <a href="login.html" class="nav-cta">Sign In</a>
</nav>

<section class="section">

  <div class="contact-grid">

    <!-- LEFT SIDE -->
    <div class="contact-info">
      <h2>Let's Talk 👋</h2>
      <p>Have a project in mind or just want to say hello? Fill out the form and we’ll get back to you.</p>

      <div class="info-item">
        <span>📍</span>
        <p>Karachi, Pakistan</p>
      </div>

      <div class="info-item">
        <span>📧</span>
        <p>hello@nexastudio.com</p>
      </div>

      <div class="info-item">
        <span>📞</span>
        <p>+92 300 1234567</p>
      </div>
    </div>

    <!-- RIGHT SIDE FORM -->
    <form class="contact-form">

      <div class="row">
        <input type="text" placeholder="First Name" required>
        <input type="text" placeholder="Last Name" required>
      </div>

      <input type="email" placeholder="Email Address" required>

      <select>
        <option>Select Service</option>
        <option>Web Development</option>
        <option>UI/UX Design</option>
        <option>Mobile App</option>
      </select>

      <textarea placeholder="Your Message..." required></textarea>

      <button type="submit">Send Message →</button>

    </form>

  </div>

</section>

</body>
</html>
